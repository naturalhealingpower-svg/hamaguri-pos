<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>はまぐり窯 書類作成</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap');

:root {
  --clay:  #8B5E3C;
  --ash:   #C4A882;
  --smoke: #EDE8DF;
  --kiln:  #3D2B1F;
  --glaze: #5C8A72;
  --ink:   #1E1612;
  --paper: #F7F3EC;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
}

/* ── ヘッダー ── */
header {
  background: var(--kiln);
  color: var(--ash);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,.35);
}
.logo { font-family: 'Noto Serif JP', serif; font-size: 1.1rem; font-weight: 600; letter-spacing: .1em; }
.logo span { color: var(--smoke); }

/* ── レイアウト ── */
.app { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 54px); }
@media(max-width:760px){ .app { grid-template-columns: 1fr; } }

/* ── 左パネル ── */
.sidebar {
  background: white;
  border-right: 1px solid var(--smoke);
  padding: 20px 16px;
  overflow-y: auto;
}
.sidebar h2 {
  font-family: 'Noto Serif JP', serif;
  font-size: .95rem;
  color: var(--clay);
  border-left: 3px solid var(--clay);
  padding-left: 10px;
  margin-bottom: 14px;
}

/* 書類タイプ選択 */
.doc-type-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 20px;
}
.doc-tab {
  padding: 8px 6px;
  border: 1.5px solid #ddd;
  border-radius: 7px;
  background: white;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: .78rem;
  cursor: pointer;
  text-align: center;
  transition: .15s;
  color: #666;
}
.doc-tab.active { border-color: var(--clay); background: var(--clay); color: white; }

.field-group { margin-bottom: 18px; }
.field-group label { display: block; font-size: .75rem; color: #888; margin-bottom: 5px; }
.field-group input, .field-group textarea, .field-group select {
  width: 100%;
  border: 1.5px solid #ddd;
  border-radius: 7px;
  padding: 8px 10px;
  font-size: .85rem;
  font-family: 'Noto Sans JP', sans-serif;
  outline: none;
  transition: border-color .2s;
}
.field-group input:focus, .field-group textarea:focus, .field-group select:focus { border-color: var(--clay); }
.field-group textarea { resize: vertical; min-height: 60px; }

/* 明細追加 */
.item-row {
  display: grid;
  grid-template-columns: 1fr 52px 72px 24px;
  gap: 5px;
  margin-bottom: 6px;
  align-items: center;
}
.item-row input {
  border: 1.5px solid #ddd;
  border-radius: 6px;
  padding: 6px 8px;
  font-size: .8rem;
  font-family: 'Noto Sans JP', sans-serif;
  outline: none;
  width: 100%;
}
.item-row input:focus { border-color: var(--clay); }
.del-btn {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: none;
  background: #f0e8e8;
  color: #c0392b;
  cursor: pointer;
  font-size: .9rem;
  display: flex; align-items: center; justify-content: center;
}

.btn {
  padding: 9px 16px;
  border: none;
  border-radius: 7px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: .83rem;
  cursor: pointer;
  transition: .15s;
}
.btn-primary { background: var(--clay); color: white; }
.btn-primary:hover { background: var(--kiln); }
.btn-success { background: var(--glaze); color: white; }
.btn-success:hover { background: #4a7560; }
.btn-outline { background: transparent; border: 1.5px solid var(--clay); color: var(--clay); }
.btn-outline:hover { background: var(--clay); color: white; }
.btn-sm { padding: 5px 12px; font-size: .76rem; }
.btn-block { width: 100%; }

/* ── 右パネル（プレビュー） ── */
.preview-area {
  padding: 24px;
  overflow-y: auto;
  background: #e8e4dc;
}
.preview-area h3 {
  font-size: .8rem;
  color: #888;
  text-align: center;
  margin-bottom: 16px;
  letter-spacing: .08em;
}

/* ── 書類本体 ── */
.document {
  background: white;
  width: 100%;
  max-width: 740px;
  margin: 0 auto;
  padding: 48px 52px;
  box-shadow: 0 4px 24px rgba(0,0,0,.15);
  font-size: 11pt;
  line-height: 1.7;
  position: relative;
}

.doc-watermark {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) rotate(-30deg);
  font-size: 5rem;
  font-family: 'Noto Serif JP', serif;
  color: rgba(139,94,60,.07);
  pointer-events: none;
  white-space: nowrap;
  font-weight: 600;
  letter-spacing: .2em;
}

.doc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; }

.doc-title-block {}
.doc-type-label {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.8rem;
  font-weight: 600;
  color: var(--kiln);
  letter-spacing: .1em;
  border-bottom: 3px solid var(--clay);
  padding-bottom: 6px;
  margin-bottom: 8px;
  display: inline-block;
}
.doc-meta { font-size: .82rem; color: #666; line-height: 1.8; }

.doc-sender {
  text-align: right;
  font-size: .85rem;
  line-height: 1.9;
}
.doc-sender .sender-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--kiln);
}
.doc-sender .stamp-area {
  display: inline-block;
  width: 52px; height: 52px;
  border: 2px solid var(--clay);
  border-radius: 50%;
  margin-left: 10px;
  vertical-align: middle;
  color: var(--clay);
  font-size: .6rem;
  line-height: 52px;
  text-align: center;
}

.doc-recipient { margin-bottom: 24px; }
.recipient-name {
  font-size: 1.1rem;
  font-weight: 500;
  border-bottom: 1.5px solid #333;
  padding-bottom: 4px;
  margin-bottom: 6px;
  display: inline-block;
  min-width: 200px;
}
.doc-subject {
  font-size: .92rem;
  margin-bottom: 20px;
  color: #444;
}

/* 明細テーブル */
.doc-table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: .88rem; }
.doc-table th {
  background: var(--kiln);
  color: var(--ash);
  padding: 8px 10px;
  text-align: left;
  font-weight: 400;
  letter-spacing: .04em;
}
.doc-table th:last-child, .doc-table td:last-child { text-align: right; }
.doc-table th:nth-child(2), .doc-table td:nth-child(2) { text-align: center; width: 60px; }
.doc-table th:nth-child(3), .doc-table td:nth-child(3) { text-align: right; width: 90px; }
.doc-table td { padding: 8px 10px; border-bottom: 1px solid #eee; }
.doc-table tr:last-child td { border-bottom: none; }
.doc-table tr:nth-child(even) td { background: #faf9f7; }

.doc-totals { margin-left: auto; width: 240px; margin-top: 8px; }
.total-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: .88rem; color: #555; border-bottom: 1px solid #eee; }
.total-row.grand { font-family: 'Noto Serif JP', serif; font-size: 1.1rem; font-weight: 600; color: var(--ink); border-bottom: 2.5px solid var(--clay); border-top: 2.5px solid var(--clay); padding: 8px 0; margin-top: 4px; }

.doc-notes {
  margin-top: 28px;
  padding: 14px 16px;
  background: var(--smoke);
  border-radius: 6px;
  font-size: .82rem;
  color: #555;
  line-height: 1.9;
}
.doc-notes-title { font-weight: 500; color: var(--clay); margin-bottom: 6px; }

.doc-footer {
  margin-top: 32px;
  padding-top: 16px;
  border-top: 1px solid #ddd;
  font-size: .78rem;
  color: #999;
  text-align: center;
  letter-spacing: .04em;
}

/* 振込先 */
.bank-info {
  margin-top: 20px;
  border: 1px solid var(--ash);
  border-radius: 6px;
  padding: 12px 16px;
  font-size: .83rem;
  line-height: 1.9;
}
.bank-info-title { font-weight: 500; color: var(--clay); margin-bottom: 6px; font-size: .85rem; }

/* 印刷用 */
@media print {
  body { background: white; }
  header, .sidebar, .preview-area > h3, .print-actions { display: none !important; }
  .app { display: block; }
  .preview-area { background: white; padding: 0; }
  .document { box-shadow: none; max-width: 100%; padding: 20px 24px; }
}

/* トースト */
.toast {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--kiln); color: var(--ash);
  padding: 10px 22px; border-radius: 30px;
  font-size: .85rem; z-index: 999;
  transition: transform .3s ease; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

.section-divider {
  border: none;
  border-top: 1px solid var(--smoke);
  margin: 16px 0;
}
</style>
</head>
<body>

<header>
  <div class="logo"><span>はまぐり窯</span> 書類作成</div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-outline btn-sm" onclick="loadFromStorage()">🔄 商品データ読込</button>
    <button class="btn btn-outline btn-sm" onclick="window.print()">🖨️ 印刷・PDF保存</button>
  </div>
</header>

<div class="app">

  <!-- ── 左：入力パネル ── -->
  <div class="sidebar">

    <!-- 書類タイプ -->
    <h2>書類の種類</h2>
    <div class="doc-type-tabs">
      <button class="doc-tab active" onclick="setDocType('estimate')">見積書</button>
      <button class="doc-tab" onclick="setDocType('invoice')">請求書</button>
      <button class="doc-tab" onclick="setDocType('delivery')">納品書</button>
      <button class="doc-tab" onclick="setDocType('receipt')">領収書</button>
    </div>

    <hr class="section-divider">

    <!-- 宛先 -->
    <h2>宛先</h2>
    <div class="field-group">
      <label>宛名（会社名・お名前）</label>
      <input id="to-name" placeholder="〇〇ギャラリー 御中" oninput="render()">
    </div>
    <div class="field-group">
      <label>住所（任意）</label>
      <textarea id="to-address" rows="2" placeholder="〒000-0000&#10;岐阜県…" oninput="render()"></textarea>
    </div>

    <hr class="section-divider">

    <!-- 書類情報 -->
    <h2>書類情報</h2>
    <div class="field-group">
      <label>書類番号</label>
      <input id="doc-no" oninput="render()">
    </div>
    <div class="field-group">
      <label>発行日</label>
      <input type="date" id="doc-date" oninput="render()">
    </div>
    <div class="field-group" id="due-date-group">
      <label>支払期限</label>
      <input type="date" id="due-date" oninput="render()">
    </div>
    <div class="field-group" id="valid-date-group" style="display:none">
      <label>見積有効期限</label>
      <input type="date" id="valid-date" oninput="render()">
    </div>
    <div class="field-group">
      <label>件名</label>
      <input id="doc-subject" placeholder="陶芸作品のご注文について" oninput="render()">
    </div>

    <hr class="section-divider">

    <!-- 明細 -->
    <h2>明細</h2>
    <div style="display:grid;grid-template-columns:1fr 52px 72px 24px;gap:5px;margin-bottom:6px">
      <span style="font-size:.72rem;color:#aaa;padding:0 2px">品名</span>
      <span style="font-size:.72rem;color:#aaa;text-align:center">数量</span>
      <span style="font-size:.72rem;color:#aaa;text-align:right">単価</span>
      <span></span>
    </div>
    <div id="items-container"></div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <button class="btn btn-outline btn-sm" onclick="addItem()">＋ 行追加</button>
      <button class="btn btn-outline btn-sm" onclick="addFromProducts()">🏺 商品から選択</button>
    </div>

    <hr class="section-divider">

    <!-- 税設定 -->
    <h2>消費税</h2>
    <div class="field-group">
      <label>税率</label>
      <select id="tax-rate" onchange="render()">
        <option value="0.10">10%（標準）</option>
        <option value="0.08">8%（軽減税率）</option>
        <option value="0">非課税・税込表示</option>
      </select>
    </div>

    <hr class="section-divider">

    <!-- 備考 -->
    <h2>備考・振込先</h2>
    <div class="field-group">
      <label>備考</label>
      <textarea id="doc-notes" rows="3" placeholder="梱包・発送方法、納期など" oninput="render()"></textarea>
    </div>
    <div class="field-group" id="bank-group">
      <label>振込先銀行口座</label>
      <textarea id="bank-info" rows="3" placeholder="〇〇銀行 〇〇支店&#10;普通 1234567&#10;口座名義：オオモリナオキ" oninput="render()"></textarea>
    </div>

    <hr class="section-divider">

    <!-- 差出人設定 -->
    <h2>差出人（初回のみ設定）</h2>
    <div class="field-group">
      <label>屋号・名前</label>
      <input id="from-name" placeholder="はまぐり窯 大森尚喜" oninput="saveSettings();render()">
    </div>
    <div class="field-group">
      <label>住所</label>
      <textarea id="from-address" rows="2" placeholder="〒000-0000&#10;岐阜県土岐市…" oninput="saveSettings();render()"></textarea>
    </div>
    <div class="field-group">
      <label>電話・メール</label>
      <input id="from-contact" placeholder="090-XXXX-XXXX / info@hamaguri.jp" oninput="saveSettings();render()">
    </div>
    <div class="field-group">
      <label>インボイス登録番号（任意）</label>
      <input id="invoice-no" placeholder="T1234567890123" oninput="saveSettings();render()">
    </div>

  </div><!-- /sidebar -->

  <!-- ── 右：プレビュー ── -->
  <div class="preview-area">
    <h3>📄 プレビュー　※「印刷・PDF保存」でそのまま使えます</h3>
    <div class="document" id="document-preview">
      <!-- JS で生成 -->
    </div>
    <div class="print-actions" style="text-align:center;margin-top:16px;display:flex;gap:10px;justify-content:center">
      <button class="btn btn-primary" onclick="window.print()">🖨️ 印刷・PDF保存</button>
      <button class="btn btn-outline" onclick="copyDocNo()">書類番号をコピー</button>
    </div>
  </div>

</div><!-- /app -->

<!-- 商品選択モーダル -->
<div id="product-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px">
  <div style="background:white;border-radius:14px;padding:24px;width:100%;max-width:420px;max-height:80vh;overflow-y:auto">
    <h2 style="font-family:'Noto Serif JP',serif;color:var(--clay);margin-bottom:14px">商品を選択</h2>
    <div id="product-list-modal"></div>
    <button class="btn btn-outline btn-block" style="margin-top:14px" onclick="closeProductModal()">閉じる</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━
//  STATE
// ━━━━━━━━━━━━━━━━━━━━━━━
let docType = 'estimate';
let items = [];
let products = [];

const DOC_LABELS = {
  estimate: '見積書',
  invoice:  '請求書',
  delivery: '納品書',
  receipt:  '領収書',
};
const WATERMARKS = {
  estimate: '見積',
  invoice:  '請求',
  delivery: '納品',
  receipt:  '領収',
};

// ━━━━━━━━━━━━━━━━━━━━━━━
//  INIT
// ━━━━━━━━━━━━━━━━━━━━━━━
window.onload = () => {
  // 今日の日付をデフォルト
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('doc-date').value = today;
  // 支払期限：1ヶ月後
  const nextMonth = new Date(); nextMonth.setMonth(nextMonth.getMonth() + 1);
  document.getElementById('due-date').value = nextMonth.toISOString().slice(0, 10);
  // 見積有効期限：2週間後
  const twoWeeks = new Date(); twoWeeks.setDate(twoWeeks.getDate() + 14);
  document.getElementById('valid-date').value = twoWeeks.toISOString().slice(0, 10);
  // 書類番号
  document.getElementById('doc-no').value = generateDocNo('estimate');
  // 設定復元
  loadSettings();
  // 商品データ読込
  loadFromStorage();
  // 初期明細
  addItem('', 1, 0);
  render();
};

function generateDocNo(type) {
  const d = new Date();
  const prefix = {estimate:'M', invoice:'S', delivery:'N', receipt:'R'}[type] || 'D';
  return prefix + d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0') + '-001';
}

function loadSettings() {
  const s = localStorage.getItem('hamaguri_doc_settings');
  if (!s) return;
  const cfg = JSON.parse(s);
  if (cfg.fromName)    document.getElementById('from-name').value = cfg.fromName;
  if (cfg.fromAddress) document.getElementById('from-address').value = cfg.fromAddress;
  if (cfg.fromContact) document.getElementById('from-contact').value = cfg.fromContact;
  if (cfg.invoiceNo)   document.getElementById('invoice-no').value = cfg.invoiceNo;
  if (cfg.bankInfo)    document.getElementById('bank-info').value = cfg.bankInfo;
}

function saveSettings() {
  const cfg = {
    fromName:    document.getElementById('from-name').value,
    fromAddress: document.getElementById('from-address').value,
    fromContact: document.getElementById('from-contact').value,
    invoiceNo:   document.getElementById('invoice-no').value,
    bankInfo:    document.getElementById('bank-info').value,
  };
  localStorage.setItem('hamaguri_doc_settings', JSON.stringify(cfg));
}

function loadFromStorage() {
  const saved = localStorage.getItem('hamaguri_products');
  if (saved) {
    products = JSON.parse(saved);
    toast('商品データを読み込みました（' + products.length + '件）');
  } else {
    toast('商品データがありません。商品管理システムで登録してください。');
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━
//  DOC TYPE
// ━━━━━━━━━━━━━━━━━━━━━━━
function setDocType(type) {
  docType = type;
  document.querySelectorAll('.doc-tab').forEach((b,i) => {
    b.classList.toggle('active', ['estimate','invoice','delivery','receipt'][i] === type);
  });
  // 書類番号を更新
  document.getElementById('doc-no').value = generateDocNo(type);
  // 支払期限・有効期限の表示切替
  document.getElementById('due-date-group').style.display = type === 'invoice' ? '' : 'none';
  document.getElementById('valid-date-group').style.display = type === 'estimate' ? '' : 'none';
  document.getElementById('bank-group').style.display = type === 'invoice' ? '' : 'none';
  render();
}

// ━━━━━━━━━━━━━━━━━━━━━━━
//  ITEMS
// ━━━━━━━━━━━━━━━━━━━━━━━
function addItem(name='', qty=1, price=0) {
  items.push({ name, qty, price });
  renderItems();
  render();
}

function removeItem(i) {
  items.splice(i, 1);
  renderItems();
  render();
}

function renderItems() {
  const c = document.getElementById('items-container');
  c.innerHTML = items.map((item, i) => `
    <div class="item-row">
      <input value="${item.name}" placeholder="品名" oninput="items[${i}].name=this.value;render()">
      <input type="number" value="${item.qty}" min="1" style="text-align:center" oninput="items[${i}].qty=Number(this.value);render()">
      <input type="number" value="${item.price}" min="0" style="text-align:right" oninput="items[${i}].price=Number(this.value);render()">
      <button class="del-btn" onclick="removeItem(${i})">×</button>
    </div>`).join('');
}

function addFromProducts() {
  if (products.length === 0) {
    toast('商品データがありません。右上の「商品データ読込」を押してください。');
    return;
  }
  const modal = document.getElementById('product-modal');
  const list = document.getElementById('product-list-modal');
  list.innerHTML = products.map(p => `
    <div onclick="selectProduct(${p.id})" style="padding:10px 12px;border-bottom:1px solid var(--smoke);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:.15s;border-radius:6px" onmouseover="this.style.background='var(--smoke)'" onmouseout="this.style.background=''">
      <div>
        <div style="font-size:.88rem;font-weight:500">${p.name}</div>
        <div style="font-size:.75rem;color:#888">在庫 ${p.stock}点</div>
      </div>
      <div style="font-family:'Noto Serif JP',serif;color:var(--clay);font-weight:600">¥${Number(p.price).toLocaleString()}</div>
    </div>`).join('');
  modal.style.display = 'flex';
}

function selectProduct(id) {
  const p = products.find(x => x.id == id);
  if (p) {
    addItem(p.name, 1, Number(p.price));
  }
  closeProductModal();
}

function closeProductModal() {
  document.getElementById('product-modal').style.display = 'none';
}

// ━━━━━━━━━━━━━━━━━━━━━━━
//  RENDER PREVIEW
// ━━━━━━━━━━━━━━━━━━━━━━━
function fmt(n) { return '¥' + Math.round(n).toLocaleString(); }
function fmtDate(s) {
  if (!s) return '　　　年　　月　　日';
  const d = new Date(s);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

function render() {
  const toName    = document.getElementById('to-name').value || '　　　　　　　　';
  const toAddress = document.getElementById('to-address').value;
  const docNo     = document.getElementById('doc-no').value;
  const docDate   = document.getElementById('doc-date').value;
  const dueDate   = document.getElementById('due-date').value;
  const validDate = document.getElementById('valid-date').value;
  const subject   = document.getElementById('doc-subject').value || '件名：　　　　　';
  const notes     = document.getElementById('doc-notes').value;
  const bankInfo  = document.getElementById('bank-info').value;
  const fromName  = document.getElementById('from-name').value || 'はまぐり窯';
  const fromAddr  = document.getElementById('from-address').value;
  const fromCont  = document.getElementById('from-contact').value;
  const invNo     = document.getElementById('invoice-no').value;
  const taxRate   = parseFloat(document.getElementById('tax-rate').value);

  const subtotal = items.reduce((s, it) => s + it.price * it.qty, 0);
  const tax      = Math.floor(subtotal * taxRate);
  const total    = subtotal + tax;

  const label = DOC_LABELS[docType];
  const wmark = WATERMARKS[docType];

  // 差出人住所を行分割
  const fromAddrLines = fromAddr ? fromAddr.split('\n').map(l => `<div>${l}</div>`).join('') : '';
  const toAddrLines   = toAddress ? toAddress.split('\n').map(l => `<div style="font-size:.8rem;color:#666">${l}</div>`).join('') : '';
  const notesLines    = notes ? notes.split('\n').map(l => `<div>${l}</div>`).join('') : '';
  const bankLines     = bankInfo ? bankInfo.split('\n').map(l => `<div>${l}</div>`).join('') : '';

  // 支払情報（請求書のみ）
  let dueLine = '';
  if (docType === 'invoice' && dueDate) {
    dueLine = `<div>お支払期限：${fmtDate(dueDate)}</div>`;
  }
  let validLine = '';
  if (docType === 'estimate' && validDate) {
    validLine = `<div>有効期限：${fmtDate(validDate)}</div>`;
  }

  // 明細行
  const tableRows = items.map(it => `
    <tr>
      <td>${it.name || '　'}</td>
      <td>${it.qty}</td>
      <td>${fmt(it.price)}</td>
      <td>${fmt(it.price * it.qty)}</td>
    </tr>`).join('');

  // 振込先（請求書のみ）
  const bankBlock = (docType === 'invoice' && bankInfo) ? `
    <div class="bank-info">
      <div class="bank-info-title">お振込先</div>
      ${bankLines}
    </div>` : '';

  // インボイス番号
  const invoiceBlock = invNo ? `<div style="font-size:.78rem;color:#888;margin-top:4px">登録番号：${invNo}</div>` : '';

  // 税表示
  let taxRow = '';
  if (taxRate > 0) {
    taxRow = `<div class="total-row"><span>消費税（${Math.round(taxRate*100)}%）</span><span>${fmt(tax)}</span></div>`;
  }

  document.getElementById('document-preview').innerHTML = `
    <div class="doc-watermark">${wmark}</div>

    <div class="doc-header">
      <div class="doc-title-block">
        <div class="doc-type-label">${label}</div>
        <div class="doc-meta">
          <div>書類番号：${docNo}</div>
          <div>発行日：${fmtDate(docDate)}</div>
          ${dueLine}
          ${validLine}
        </div>
      </div>
      <div class="doc-sender">
        <div class="sender-name">${fromName}</div>
        ${fromAddrLines}
        <div style="font-size:.8rem;color:#666">${fromCont}</div>
        ${invoiceBlock}
        <span class="stamp-area">印</span>
      </div>
    </div>

    <div class="doc-recipient">
      ${toAddrLines}
      <div class="recipient-name">${toName}　様</div>
    </div>

    <div class="doc-subject">件名：${subject}</div>

    <div style="font-size:.88rem;color:#444;margin-bottom:12px">
      下記のとおり${{ estimate:'お見積り申し上げます。', invoice:'ご請求申し上げます。', delivery:'納品いたします。', receipt:'領収いたしました。'}[docType]}
    </div>

    <table class="doc-table">
      <thead>
        <tr>
          <th>品名・内容</th>
          <th>数量</th>
          <th>単価</th>
          <th>金額</th>
        </tr>
      </thead>
      <tbody>${tableRows}</tbody>
    </table>

    <div class="doc-totals">
      <div class="total-row"><span>小計</span><span>${fmt(subtotal)}</span></div>
      ${taxRow}
      <div class="total-row grand"><span>${label}金額</span><span>${fmt(total)}</span></div>
    </div>

    ${bankBlock}

    ${notes ? `<div class="doc-notes"><div class="doc-notes-title">備考</div>${notesLines}</div>` : ''}

    <div class="doc-footer">
      ${fromName}　${fromCont}
    </div>
  `;
}

function copyDocNo() {
  const no = document.getElementById('doc-no').value;
  navigator.clipboard.writeText(no).then(() => toast('書類番号をコピーしました：' + no));
}

// ━━━━━━━━━━━━━━━━━━━━━━━
//  TOAST
// ━━━━━━━━━━━━━━━━━━━━━━━
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// モーダル外クリックで閉じる
document.getElementById('product-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('product-modal')) closeProductModal();
});
</script>
</body>
</html>
